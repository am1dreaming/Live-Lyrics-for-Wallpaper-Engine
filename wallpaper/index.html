<!-- MinenkoY -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Lyrics by am1dreaming</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="bg">
    <div class="bg-cover" id="cover0"></div>
    <div class="bg-cover" id="cover1"></div>
    <div id="bg-custom"></div>
    <video id="bg-video" loop muted autoplay playsinline></video>
    <div id="bg-shade"></div>
    <div id="bg-dim"></div>
    <div id="bg-pulse"></div>
  </div>

  <div id="stage">
    <aside id="left">
      <div id="art">
        <video id="art-video" loop muted playsinline></video>
      </div>
      <div id="info">
        <div id="meta">
          <div id="title"></div>
          <div id="artist"></div>
        </div>
        <div id="progress">
          <div id="progress-track"><div id="progress-fill"></div></div>
          <div id="progress-time"><span id="time-cur">0:00</span><span id="time-total">0:00</span></div>
        </div>
      </div>
    </aside>

    <section id="right">
      <div id="lyrics-viewport">
        <div id="lyrics-content"></div>
      </div>
      <div id="no-lyrics">
        <div id="nl-title"></div>
        <div id="nl-artist"></div>
      </div>
    </section>
  </div>

  <div id="grain"></div>

  <div id="status" class="disconnected"></div>

  <script src="spring.js"></script>
  <script src="scroll-controller.js"></script>
  <script src="lyrics-engine.js"></script>
  <script src="background.js"></script>
  <script src="mock-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
